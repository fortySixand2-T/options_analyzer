services:
  # Full app: FastAPI backend serving React frontend
  app:
    build:
      context: .
      target: prod
    ports:
      - "9000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: python -m uvicorn ui.app:app --host 0.0.0.0 --port 8000

  # Run the full test suite
  test:
    build:
      context: .
      target: dev
    command: python -m pytest tests/ -v

  # CLI scanner (one-off runs)
  scan:
    build:
      context: .
      target: prod
    env_file: .env
    command: python scripts/scan.py SPY,QQQ,IWM --strategies --top 10

  # Backtester (one-off runs)
  backtest:
    build:
      context: .
      target: prod
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python scripts/run_backtest.py --strategy iron_condor --symbol SPY

  # Interactive shell with full dev environment
  shell:
    build:
      context: .
      target: dev
    stdin_open: true
    tty: true
    env_file: .env
    volumes:
      - .:/app
      - ./data:/app/data
    command: bash

