services:
  # Full app: FastAPI backend serving React frontend
  app:
    build:
      context: .
      target: prod
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python -m uvicorn ui.app:app --host 0.0.0.0 --port 8000

  # Run the full test suite
  test:
    build:
      context: .
      target: dev
    command: python -m pytest tests/ -v

  # CLI scanner (one-off runs)
  scan:
    build:
      context: .
      target: prod
    env_file: .env
    command: python scripts/scan.py SPY,QQQ,IWM --strategies --top 10

  # Backtester (one-off runs)
  backtest:
    build:
      context: .
      target: prod
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python scripts/backtest.py --strategy iron_condor --symbol SPY

  # Interactive shell with full dev environment
  shell:
    build:
      context: .
      target: dev
    stdin_open: true
    tty: true
    env_file: .env
    volumes:
      - .:/app
      - ./data:/app/data
    command: bash

  # Existing services
  bs:
    build:
      context: .
      target: prod
    volumes:
      - ./exports:/app/exports
    command: python src/options_test_runner.py --json config/option_configs.json

  mc:
    build:
      context: .
      target: prod
    volumes:
      - ./mc_results:/app/mc_results
    command: >
      python src/mc_runner.py
        --json config/mc_config.json
        --num_paths 10000
        --seed 42
        --plot

  scenario:
    build:
      context: .
      target: prod
    volumes:
      - ./mc_results:/app/mc_results
    command: >
      python src/scenario_runner.py
        --json config/mc_config.json
        --plot
